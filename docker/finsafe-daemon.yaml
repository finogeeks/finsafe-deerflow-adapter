# FinSAFE SaaS daemon — standalone sidecar for DeerFlow (or any HTTP client).
# Token must match FINSAFE_TOKEN env and sandbox.token in DeerFlow config.yaml.

schema_version: 1

server:
  bind: "0.0.0.0:8080"

auth:
  bearer_token: "dev-change-me"
  user_id: "app-user"
  tenant_id: "acme"

storage:
  runtime_root: "/var/lib/finsafe"

executor:
  finsafe_cli: "/usr/local/bin/finsafe"
  mock_cells: false

sessions:
  reaper_interval_secs: 60

resident: {}

# Policy-router host capabilities (short-lived executions only; not resident brokers).
# Enable when sandbox.network_mode is allowlist. Embedded finsafe-net-proxy per execution.
# Do not set proxy_profiles — network.mode=proxy is not supported by the S1 executor.
host_capabilities:
  allowlist_supported: true

host_profiles:
  linux-desktop-isolated:
    memory_max: "8G"
